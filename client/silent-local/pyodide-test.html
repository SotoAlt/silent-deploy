<!doctype html>
<html>
<head>
<title>Pyodide + PyTorch feasibility test</title>
<style>
  body { font-family: ui-monospace, monospace; padding: 24px; background: #1a1a1a; color: #ddd; max-width: 900px; }
  pre { background: #0a0a0a; padding: 12px; border-left: 3px solid #d99a5f; white-space: pre-wrap; }
  .ok { color: #5ce388; }
  .err { color: #ff5b6c; }
  .info { color: #4fe8d6; }
  h1 { font-weight: 400; }
</style>
</head>
<body>
<h1>Pyodide + PyTorch feasibility test</h1>
<p>Tests whether the silent predator's exact PyTorch code can run in-browser via Pyodide WASM.</p>
<pre id="log">starting...</pre>
<script src="https://cdn.jsdelivr.net/pyodide/v0.27.7/full/pyodide.js"></script>
<script type="module">
const log = document.getElementById('log');
const append = (msg, cls = '') => {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = msg + '\n';
  log.appendChild(span);
};

async function main() {
  const t0 = performance.now();
  append(`[${((performance.now()-t0)/1000).toFixed(1)}s] Loading Pyodide...`, 'info');
  let pyodide;
  try {
    pyodide = await loadPyodide();
    append(`[${((performance.now()-t0)/1000).toFixed(1)}s] Pyodide loaded ✓`, 'ok');
  } catch (e) {
    append(`Pyodide load FAILED: ${e}`, 'err');
    return;
  }

  // Test basic Python
  try {
    const result = pyodide.runPython(`
import sys
sys.version
`);
    append(`Python version: ${result}`, 'ok');
  } catch (e) {
    append(`Python failed: ${e}`, 'err');
    return;
  }

  // Try numpy first (definitely supported)
  append(`[${((performance.now()-t0)/1000).toFixed(1)}s] Loading numpy...`, 'info');
  try {
    await pyodide.loadPackage('numpy');
    pyodide.runPython('import numpy as np; print(f"numpy {np.__version__}")');
    append(`[${((performance.now()-t0)/1000).toFixed(1)}s] numpy OK ✓`, 'ok');
  } catch (e) {
    append(`numpy failed: ${e}`, 'err');
  }

  // Try the official "torch" package via Pyodide's loadPackage first
  // (newer pyodide ships some torch builds directly). Fall back to
  // micropip if not bundled.
  append(`[${((performance.now()-t0)/1000).toFixed(1)}s] Trying pyodide.loadPackage('torch')...`, 'info');
  try {
    await pyodide.loadPackage('torch');
    const r = pyodide.runPython(`
import torch
x = torch.randn(3, 4)
y = torch.matmul(x, x.T)
f"loadPackage OK: torch {torch.__version__}; matmul shape {tuple(y.shape)}; mean {y.mean().item():.4f}"
`);
    append(`[${((performance.now()-t0)/1000).toFixed(1)}s] ${r} ✓`, 'ok');
  } catch (e1) {
    append(`loadPackage('torch') failed: ${(e1 + '').slice(0, 300)}`, 'err');

    // Fallback: micropip — capture stdout/stderr to surface the real reason.
    append(`[${((performance.now()-t0)/1000).toFixed(1)}s] Falling back to micropip.install...`, 'info');
    try {
      await pyodide.loadPackage('micropip');
      // Capture all output so we get real errors, not "undefined".
      const stdoutBuf = [];
      const stderrBuf = [];
      pyodide.setStdout({ batched: (s) => stdoutBuf.push(s) });
      pyodide.setStderr({ batched: (s) => stderrBuf.push(s) });
      let result;
      try {
        result = await pyodide.runPythonAsync(`
import micropip, traceback
try:
    await micropip.install("torch", keep_going=True)
    import torch
    print("micropip OK: torch", torch.__version__)
    x = torch.randn(3, 4)
    y = torch.matmul(x, x.T)
    print("matmul:", tuple(y.shape), "mean", y.mean().item())
    "OK"
except Exception as e:
    print("EXC:", type(e).__name__, str(e))
    traceback.print_exc()
    "FAILED"
`);
      } finally {
        pyodide.setStdout({});
        pyodide.setStderr({});
      }
      append(`micropip result: ${result}`, result === 'OK' ? 'ok' : 'err');
      if (stdoutBuf.length) append(`stdout:\n${stdoutBuf.join('')}`, 'info');
      if (stderrBuf.length) append(`stderr:\n${stderrBuf.join('')}`, 'err');
    } catch (e2) {
      append(`micropip path crashed: ${(e2 + '').slice(0, 500)}`, 'err');
    }
  }

  append(`\nTotal time: ${((performance.now()-t0)/1000).toFixed(1)}s`, 'info');
}
main();
</script>
</body>
</html>
